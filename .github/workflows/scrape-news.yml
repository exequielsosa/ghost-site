name: Scrape Ghost News

# Ejecutar DIARIAMENTE a las 10:00 AM UTC con rotación automática de feeds
# Estrategia: 2 feeds/día para mantenerse dentro del límite de 100K tokens/día de Groq
on:
  schedule:
    - cron: "0 10 * * *" # Todos los días a las 10:00 UTC

  # Permitir ejecución manual desde GitHub Actions UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🛠️ Install tsx for TypeScript execution
        run: npm install -D tsx

      - name: 🤖 Run news scraper
        env:
          NEWS_API_URL: ${{ secrets.NEWS_API_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npx tsx scripts/scrape-news.js

      # TODO: Activar cuando se creen las cuentas fan de Ghost en redes sociales
      # - name: 📣 Post to social media
      #   env:
      #     SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      #     SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      #     FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      #     FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      #     INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      #     INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      #     TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      #     TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      #     TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      #     TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      #   run: node scripts/post-social.js

      - name: 📊 Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 30
